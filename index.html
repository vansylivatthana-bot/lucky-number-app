<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lucky Number VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ນຳໃຊ້ສີມາດຕະຖານຂອງ Telegram Theme ເພື່ອໃຫ້ແອັບກົມກືນ ແລະ ປ່ຽນສີຕາມ Dark/Light Mode ອັດຕະໂນມັດ */
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .header {
            background-color: var(--tg-theme-secondary-bg-color, #f1f1f1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .wallet-box {
            font-size: 26px;
            font-weight: bold;
            color: #28a745;
            margin-top: 5px;
        }
        .input-group {
            margin: 30px 0;
        }
        input[type="number"] {
            width: 70%;
            padding: 15px;
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 5px;
            text-align: center;
            border: 2px solid var(--tg-theme-button-color, #2481cc);
            border-radius: 12px;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            outline: none;
        }
        .message {
            margin-top: 10px;
            font-size: 14px;
            color: #dc3545; /* ສີແດງແຈ້ງເຕືອນ */
            height: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div id="userInfo">ສະບາຍດີ, ລູກຄ້າ!</div>
        <div style="margin-top: 10px; font-size: 14px;">ຍອດເງິນ In-App Wallet:</div>
        <div class="wallet-box" id="balance">ກຳລັງໂຫຼດ...</div>
    </div>

    <h3>ເລືອກຕົວເລກນຳໂຊກຂອງທ່ານ</h3>
    <p style="font-size: 14px; color: gray;">ກະລຸນາປ້ອນຕົວເລກ 5 ຫຼັກ (00000 - 99999)</p>

    <div class="input-group">
        <input type="number" id="luckyNumber" placeholder="00000" oninput="checkInput()" pattern="\d*">
    </div>
    
    <div class="message" id="errorMsg"></div>

    <script>
        // 1. ເອີ້ນໃຊ້ງານ Telegram Web App
        const tg = window.Telegram.WebApp;
        
        // ຂະຫຍາຍໜ້າຈໍແອັບໃຫ້ເຕັມຈໍມືຖື
        tg.expand();

        // 2. ດຶງຂໍ້ມູນຊື່ຜູ້ໃຊ້ ແລະ ຍອດເງິນຈາກ Backend
        const user = tg.initDataUnsafe?.user;
        if (user) {
            // ສະແດງຊື່ລູກຄ້າ
            document.getElementById('userInfo').innerText = `ສະບາຍດີ, ${user.first_name}!`;

            // ----- ສ່ວນທີ່ເພີ່ມໃໝ່: ດຶງຍອດເງິນມາສະແດງ -----
            const telegramId = user.id;
            fetch(`https://lucky-backend-api.onrender.com/api/balance/${telegramId}`)
                .then(response => response.json())
                .then(data => {
                    // ເມື່ອໄດ້ຍອດເງິນມາແລ້ວ ເອົາມາສະແດງແທນຄຳວ່າ 'ກຳລັງໂຫຼດ...'
                    document.getElementById('balance').innerText = `${data.balance} USDT`;
                })
                .catch(error => {
                    document.getElementById('balance').innerText = "Error";
                    console.error("ດຶງຂໍ້ມູນຜິດພາດ:", error);
                });
            // ----------------------------------------
        }

        const luckyInput = document.getElementById('luckyNumber');
        const errorMsg = document.getElementById('errorMsg');

        // 3. ຕັ້ງຄ່າປຸ່ມຫຼັກ (Main Button) ຂອງ Telegram ທີ່ຢູ່ລຸ່ມສຸດຂອງໜ້າຈໍ
        tg.MainButton.setText("ຊື້ຕົວເລກນີ້ (10 USDT)");
        tg.MainButton.textColor = "#ffffff";
        tg.MainButton.color = tg.themeParams.button_color || "#2481cc";

        // 4. ຟັງຊັນກວດສອບການພິມຕົວເລກ
        function checkInput() {
            let val = luckyInput.value.toString();
            
            // ປ້ອງກັນການພິມເກີນ 5 ຫຼັກ
            if (val.length > 5) {
                val = val.slice(0, 5);
                luckyInput.value = val;
            }

            // ຖ້າພິມຄົບ 5 ຫຼັກແທ້ ໃຫ້ສະແດງປຸ່ມຊື້
            if (val.length === 5) {
                errorMsg.innerText = "";
                tg.MainButton.show(); // ສະແດງປຸ່ມຂຶ້ນມາ
            } else {
                errorMsg.innerText = "ກະລຸນາປ້ອນຕົວເລກໃຫ້ຄົບ 5 ຫຼັກ";
                tg.MainButton.hide(); // ເຊື່ອງປຸ່ມໄວ້ຖ້າພິມບໍ່ຄົບ
            }
        }

        // 5. ເມື່ອລູກຄ້າກົດປຸ່ມ "ຊື້ຕົວເລກນີ້"
        Telegram.WebApp.onEvent('mainButtonClicked', function(){
            const numberToBuy = luckyInput.value;
            
            // ຈັດຮູບແບບຂໍ້ມູນເພື່ອສົ່ງກັບໄປຫາ Backend
            const dataPayload = {
                action: "buy_number",
                number: numberToBuy
            };

            // ສົ່ງຂໍ້ມູນກັບໄປຫາແຊັດ Bot 
            tg.sendData(JSON.stringify(dataPayload));
            
            // ປິດໜ້າຈໍ Mini App ເພື່ອກັບໄປໜ້າແຊັດ
            tg.close();
        });
    </script>
</body>
</html>
